---
- name: Install Nginx and Deploy Website
  hosts: webservers
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Nginx and Git
      apt:
        name:
          - nginx
          - git
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Remove default nginx site
      file:
        path: /var/www/html
        state: absent

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: /var/www/portfolio
        version: main
        force: yes

    - name: Set ownership and permissions
      file:
        path: /var/www/portfolio
        owner: www-data
        group: www-data
        mode: "0755"
        recurse: yes
    
    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/portfolio
        dest: /etc/nginx/sites-enabled/portfolio
        state: link
    
    - name: Deploy nginx config
      copy:
        src: nginx.conf
        dest: /etc/nginx/conf.d/portfolio.conf

    - name: Test nginx config
      command: nginx -t

    - name: Restart nginx
      service:
        name: nginx
        state: restarted